name: Daily Hotnews

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 推送热点新闻
        env:
          SCT_KEY: ${{ secrets.SCT_KEY }}
          TIAN_API_KEY: ${{ secrets.TIAN_API_KEY }}
        run: python3 .github/scripts/daily-hotnews.py
